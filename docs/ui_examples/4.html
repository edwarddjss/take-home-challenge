<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                        "peach": "#ffb399",
                        "wobbly": "#ffec80",
                        "charcoal": "#1a1c1b",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .brutalist-shadow {
            box-shadow: 4px 4px 0px 0px rgba(26, 28, 27, 1);
        }
        .brutalist-border {
            border: 2px solid #1a1c1b;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-charcoal">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-6 py-4 md:px-20 lg:px-40">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary brutalist-border flex items-center justify-center">
<span class="material-symbols-outlined text-charcoal">style</span>
</div>
<h2 class="text-charcoal text-2xl font-bold tracking-tight">Deck</h2>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-white brutalist-border text-charcoal hover:bg-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex flex-1 flex-col items-center justify-center px-4 py-8 md:px-20 lg:px-40 max-w-4xl mx-auto w-full">
<!-- Progress Section -->
<div class="w-full mb-12">
<div class="flex justify-between items-end mb-3">
<span class="text-charcoal/60 font-semibold uppercase tracking-wider text-xs">Current Session</span>
<span class="text-charcoal font-bold text-xl">1<span class="text-charcoal/30">/10</span></span>
</div>
<div class="h-4 w-full bg-white brutalist-border overflow-hidden p-0.5">
<div class="h-full bg-primary" style="width: 10%;"></div>
</div>
</div>
<!-- Main Flashcard -->
<div class="relative w-full aspect-[4/3] md:aspect-[16/9] flex flex-col bg-white brutalist-border brutalist-shadow p-8 md:p-12 mb-12 items-center justify-center text-center group cursor-pointer">
<div class="absolute top-4 left-6 text-charcoal/20">
<span class="material-symbols-outlined text-4xl">format_quote</span>
</div>
<div class="flex flex-col gap-6">
<h1 class="text-2xl md:text-4xl font-bold leading-tight text-charcoal">
                        What is the core principle of Pastel Brutalism?
                    </h1>
<p class="text-charcoal/50 text-sm md:text-base font-medium">
                        Focus on raw structure combined with soft, approachable aesthetics.
                    </p>
</div>
<div class="mt-12 w-full max-w-xs">
<button class="w-full bg-primary brutalist-border brutalist-shadow py-4 px-8 text-charcoal font-bold text-lg hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all flex items-center justify-center gap-2">
<span>REVEAL ANSWER</span>
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="absolute bottom-4 right-6">
<span class="text-xs font-bold text-charcoal/30 uppercase tracking-widest">Front of Card</span>
</div>
</div>
<!-- Confidence Indicators -->
<div class="w-full flex flex-col gap-6">
<h4 class="text-charcoal/40 text-xs font-bold uppercase tracking-[0.2em] text-center">How well did you know this?</h4>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- Blank -->
<button class="flex flex-col items-center justify-center gap-2 bg-peach brutalist-border brutalist-shadow py-6 px-4 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all group">
<span class="material-symbols-outlined text-3xl mb-1 group-hover:scale-110 transition-transform">sentiment_very_dissatisfied</span>
<span class="font-bold text-charcoal uppercase tracking-tighter">Blank</span>
<span class="text-[10px] font-bold text-charcoal/40">Try again soon</span>
</button>
<!-- Wobbly -->
<button class="flex flex-col items-center justify-center gap-2 bg-wobbly brutalist-border brutalist-shadow py-6 px-4 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all group">
<span class="material-symbols-outlined text-3xl mb-1 group-hover:scale-110 transition-transform">sentiment_neutral</span>
<span class="font-bold text-charcoal uppercase tracking-tighter">Wobbly</span>
<span class="text-[10px] font-bold text-charcoal/40">Review tomorrow</span>
</button>
<!-- Locked -->
<button class="flex flex-col items-center justify-center gap-2 bg-primary brutalist-border brutalist-shadow py-6 px-4 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all group">
<span class="material-symbols-outlined text-3xl mb-1 group-hover:scale-110 transition-transform">sentiment_very_satisfied</span>
<span class="font-bold text-charcoal uppercase tracking-tighter">Locked</span>
<span class="text-[10px] font-bold text-charcoal/40">Mastered</span>
</button>
</div>
</div>
</main>
<!-- Footer Decoration -->
<footer class="py-8 flex justify-center gap-4">
<div class="size-2 rounded-full bg-charcoal/10"></div>
<div class="size-2 rounded-full bg-charcoal/10"></div>
<div class="size-2 rounded-full bg-charcoal/10"></div>
</footer>
</div>
</div>
</body></html>
