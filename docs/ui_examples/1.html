<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#fdfaf1", // Soft cream
                        "accent-mint": "#d1fae5",
                        "accent-butter": "#fef08a",
                        "charcoal": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .brutalist-shadow {
            box-shadow: 4px 4px 0px 0px #1e293b;
        }
        .brutalist-border {
            border: 2px solid #1e293b;
        }
    </style>
</head>
<body class="bg-background-light font-display text-charcoal">
<div class="relative flex min-h-screen flex-col items-center overflow-x-hidden">
<!-- Navigation -->
<nav class="w-full max-w-4xl px-6 py-6 flex justify-between items-center">
<div class="flex items-center gap-2 brutalist-border bg-white px-4 py-2 rounded-full brutalist-shadow">
<span class="material-symbols-outlined text-primary">layers</span>
<span class="font-bold text-xl tracking-tight">Deck</span>
</div>
<div class="flex gap-4">
<button class="size-12 brutalist-border bg-accent-mint rounded-full flex items-center justify-center brutalist-shadow hover:translate-y-1 hover:shadow-none transition-all">
<span class="material-symbols-outlined">search</span>
</button>
<div class="size-12 brutalist-border bg-accent-butter rounded-full overflow-hidden brutalist-shadow" data-alt="Abstract pastel geometric profile avatar">
<img alt="User avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqrG6lmAcw50h79aTCxYZ_qDDTV9NVNXSt3YaTBp84ZpnW7WMuPZOfxzUvO4rjgRIQXykkWMnR-YqaTEgjwxeAsn5n8ub_4pmV4-S9BiaoJTRUTRjaULxP8klr7HIoeqQtCh87P1k0x2I4fL7IOrLBCxhJjX2OU4fsxuakQnXd0ftwVpkO40D6cwBhj1ZBu_D5zOYmB2a16pStS5GKrYZo5ojohslpX4bV7Ng6w2XN7hbpviGrwjdrpMLP3H1h8IzrY2zwdtUbMzo"/>
</div>
</div>
</nav>
<!-- Main Content -->
<main class="flex-1 w-full max-w-2xl px-6 py-12 flex flex-col items-center text-center">
<!-- Hero Header -->
<div class="mb-12">
<span class="bg-primary/20 text-charcoal px-4 py-1 rounded-full text-sm font-bold brutalist-border mb-6 inline-block">AI FLASHCARDS</span>
<h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter">Deck</h1>
<p class="text-xl text-charcoal/70 max-w-md mx-auto">Master any subject with instant, AI-generated flashcards.</p>
</div>
<!-- Interaction Card -->
<div class="w-full bg-white brutalist-border rounded-xl p-8 brutalist-shadow space-y-8">
<!-- Input Field -->
<div class="space-y-3 text-left">
<label class="font-bold text-lg px-2">What do you want to learn?</label>
<div class="relative">
<input class="w-full h-16 brutalist-border rounded-xl px-6 text-lg focus:ring-0 focus:border-primary bg-background-light placeholder:text-charcoal/30" placeholder="e.g. JavaScript Closures" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-charcoal/40">auto_awesome</span>
</div>
<p class="text-sm text-charcoal/50 px-2 italic">AI will generate a custom study deck from your topic.</p>
</div>
<!-- Difficulty Selector -->
<div class="space-y-3 text-left">
<label class="font-bold text-lg px-2">Difficulty Selection</label>
<div class="grid grid-cols-3 gap-3">
<button class="h-12 brutalist-border rounded-xl font-bold bg-accent-mint hover:bg-primary transition-colors">Easy</button>
<button class="h-12 brutalist-border rounded-xl font-bold bg-white hover:bg-accent-butter transition-colors">Medium</button>
<button class="h-12 brutalist-border rounded-xl font-bold bg-white hover:bg-red-200 transition-colors">Hard</button>
</div>
</div>
<!-- Card Count -->
<div class="space-y-3 text-left">
<label class="font-bold text-lg px-2">Number of cards</label>
<div class="flex gap-4">
<button class="flex-1 h-12 brutalist-border rounded-xl font-bold bg-white hover:scale-105 transition-transform">5</button>
<button class="flex-1 h-12 brutalist-border rounded-xl font-bold bg-accent-butter hover:scale-105 transition-transform">10</button>
<button class="flex-1 h-12 brutalist-border rounded-xl font-bold bg-white hover:scale-105 transition-transform">15</button>
</div>
</div>
<!-- Generate Button -->
<button class="w-full h-20 bg-primary brutalist-border rounded-full text-2xl font-black text-charcoal brutalist-shadow hover:translate-y-1 hover:shadow-none transition-all flex items-center justify-center gap-3">
                    Generate deck
                    <span class="material-symbols-outlined">bolt</span>
</button>
</div>
<!-- Footer Icons/Help -->
<div class="mt-12 flex gap-8 items-center text-charcoal/60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-charcoal">history</span>
<span class="font-medium">Recent Decks</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-charcoal">explore</span>
<span class="font-medium">Explore</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-charcoal">help</span>
<span class="font-medium">How it works</span>
</div>
</div>
</main>
<!-- Sidebar Decorative Elements -->
<div class="fixed left-10 top-1/2 -translate-y-1/2 hidden xl:flex flex-col gap-6">
<div class="size-16 bg-accent-mint rounded-xl brutalist-border brutalist-shadow flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">psychology</span>
</div>
<div class="size-16 bg-accent-butter rounded-xl brutalist-border brutalist-shadow flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">grade</span>
</div>
<div class="size-16 bg-primary rounded-xl brutalist-border brutalist-shadow flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">menu_book</span>
</div>
</div>
<div class="fixed right-10 bottom-10">
<button class="px-6 py-4 bg-charcoal text-white rounded-full flex items-center gap-2 brutalist-shadow border-2 border-white">
<span class="material-symbols-outlined">question_answer</span>
<span class="font-bold">Feedback</span>
</button>
</div>
</div>
</body></html>
