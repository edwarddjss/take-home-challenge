<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f1efff", // Soft lavender base
                        "background-dark": "#102219",
                        "charcoal": "#1a1a1a",
                        "lavender-accent": "#e0d7ff"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .brutalist-border {
            border: 2px solid #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
        }
        .card-stack-item {
            border: 2px solid #1a1a1a;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="relative flex h-full min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navbar -->
<header class="flex items-center justify-between whitespace-nowrap border-b-2 border-charcoal bg-white/50 backdrop-blur-md px-6 md:px-10 py-4">
<div class="flex items-center gap-3 text-charcoal">
<div class="size-8 bg-primary brutalist-border flex items-center justify-center rounded">
<span class="material-symbols-outlined text-charcoal font-bold">layers</span>
</div>
<h2 class="text-charcoal text-xl font-bold leading-tight tracking-tight">Deck</h2>
</div>
<div class="flex gap-2">
<div class="w-8 h-8 rounded-full bg-lavender-accent border-2 border-charcoal"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-6">
<div class="layout-content-container flex flex-col max-w-[480px] w-full gap-8">
<!-- Illustration Area: Pastel Brutalist Style -->
<div class="relative w-full aspect-square max-h-[320px] bg-white rounded-xl brutalist-border flex items-center justify-center overflow-hidden">
<div class="relative w-48 h-64">
<!-- Stacked Cards Illustration -->
<div class="absolute inset-0 bg-primary/20 rounded-lg brutalist-border rotate-[-6deg] translate-y-4 translate-x-[-8px]"></div>
<div class="absolute inset-0 bg-lavender-accent rounded-lg brutalist-border rotate-[-3deg] translate-y-2 translate-x-[-4px]"></div>
<div class="absolute inset-0 bg-white rounded-lg brutalist-border flex flex-col p-4 gap-3">
<div class="w-full h-1/2 bg-slate-100 rounded-md border border-charcoal/20 flex items-center justify-center">
<span class="material-symbols-outlined text-charcoal/30 text-4xl">image</span>
</div>
<div class="w-3/4 h-3 bg-charcoal/10 rounded-full"></div>
<div class="w-full h-3 bg-charcoal/10 rounded-full"></div>
<div class="w-1/2 h-3 bg-primary/40 rounded-full"></div>
</div>
<!-- Floating Element -->
<div class="absolute -top-4 -right-4 size-16 bg-primary rounded-full brutalist-border flex items-center justify-center">
<span class="material-symbols-outlined text-charcoal text-2xl">auto_awesome</span>
</div>
</div>
<!-- Background Pattern Decor -->
<div class="absolute top-4 left-4 size-4 bg-charcoal rounded-full"></div>
<div class="absolute bottom-4 right-4 size-8 border-2 border-charcoal rounded-lg rotate-12"></div>
</div>
<!-- Text Status -->
<div class="text-center space-y-2">
<h1 class="text-charcoal tracking-tight text-3xl font-bold leading-tight">Generating your deck...</h1>
<p class="text-charcoal/60 text-lg font-medium">Minimal, calm, and intentional.</p>
</div>
<!-- Custom Progress Bar -->
<div class="flex flex-col gap-4 w-full bg-white p-6 rounded-xl brutalist-border">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-charcoal/50 text-xs font-bold uppercase tracking-widest">Current Task</span>
<p class="text-charcoal text-lg font-bold leading-none">Building card structures</p>
</div>
<p class="text-charcoal text-2xl font-bold leading-none">68%</p>
</div>
<!-- Progress Track -->
<div class="h-6 w-full bg-lavender-accent rounded-full border-2 border-charcoal overflow-hidden p-1">
<div class="h-full bg-primary rounded-full border-r-2 border-charcoal" style="width: 68%;"></div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm font-bold">check_circle</span>
<p class="text-charcoal/70 text-sm font-medium">Layouts optimized for clarity</p>
</div>
</div>
<!-- Footer Tip -->
<div class="flex items-center justify-center gap-2 opacity-60">
<span class="material-symbols-outlined text-charcoal text-sm">lightbulb</span>
<p class="text-charcoal text-xs font-medium">Pro tip: You can edit any card once the deck is ready.</p>
</div>
</div>
</main>
<!-- Bottom Spacer for Layout Consistency -->
<footer class="p-8"></footer>
</div>
</div>
</body></html>
